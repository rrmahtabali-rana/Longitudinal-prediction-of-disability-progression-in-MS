
name: ms-progression
channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.10,<3.13
  - pip

  # Core scientific stack
  - numpy>=1.26,<2.2
  - pandas>=2.1,<2.3
  - scipy>=1.11,<1.15

  # I/O
  - openpyxl>=3.1,<3.2

  # Plotting
  - matplotlib>=3.8,<3.10

  # Classical ML
  - scikit-learn>=1.4,<1.6

  # Survival analysis (conda-forge has scikit-survival)
  - scikit-survival>=0.22,<0.25

  # Deep learning (CPU build)
  - pytorch>=2.1,<2.5
  - cpuonly                # remove for GPU support; replace with pytorch-cuda

  # Notebook support
  - jupyter
  - ipykernel

  # Pinned via pip (not on conda-forge)
  - pip:
      - catboost>=1.2,<1.3
